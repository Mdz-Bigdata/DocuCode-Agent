<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP 工具 - DocuCode Agent Ultimate</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <i class="fas fa-brain"></i>
                    </div>
                    <h1>DocuCode Agent</h1>
                    <span class="ultimate-badge">ULTIMATE</span>
                </div>
            </div>
            
            <nav class="nav-menu">
                <a href="/" class="nav-item" data-page="dashboard">
                    <i class="fas fa-th-large"></i>
                    <span>主控制台</span>
                </a>
                <a href="/api/customer-service" class="nav-item" data-page="customer">
                    <i class="fas fa-headset"></i>
                    <span>智能客服</span>
                </a>
                <a href="/api/rag" class="nav-item" data-page="rag">
                    <i class="fas fa-database"></i>
                    <span>RAG 知识库</span>
                </a>
                <a href="/api/mcp" class="nav-item active" data-page="mcp">
                    <i class="fas fa-plug"></i>
                    <span>MCP 工具</span>
                </a>
                <a href="/api/skills" class="nav-item" data-page="skills">
                    <i class="fas fa-puzzle-piece"></i>
                    <span>技能管理</span>
                    <span class="nav-badge">新</span>
                </a>
                <a href="/api/code-helper" class="nav-item" data-page="code">
                    <i class="fas fa-code"></i>
                    <span>代码助手</span>
                </a>
                <div class="nav-divider"></div>
                <a href="/api/settings" class="nav-item" data-page="settings">
                    <i class="fas fa-cog"></i>
                    <span>设置</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <div class="connection-status">
                    <span class="status-dot online"></span>
                    <span>工具就绪</span>
                </div>
                <div class="version-info">v4.0.0</div>
            </div>
        </div>
        
        <div class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <h2 class="page-title">MCP 工具中心</h2>
                    <p class="page-subtitle">强大的工具集，扩展您的 AI 能力</p>
                </div>
                <div class="header-right">
                    <button class="header-btn" id="refreshToolsBtn">
                        <i class="fas fa-sync-alt"></i>
                        刷新
                    </button>
                    <button class="header-btn primary" id="addToolBtn">
                        <i class="fas fa-plus"></i>
                        新增工具
                    </button>
                </div>
            </header>
            
            <div class="content-area">
                <div class="mcp-stats">
                    <div class="mcp-stat-card">
                        <div class="mcp-stat-icon">
                            <i class="fas fa-tools"></i>
                        </div>
                        <div class="mcp-stat-info">
                            <h3 id="toolCount">6</h3>
                            <p>可用工具</p>
                        </div>
                    </div>
                    <div class="mcp-stat-card">
                        <div class="mcp-stat-icon green">
                            <i class="fas fa-play-circle"></i>
                        </div>
                        <div class="mcp-stat-info">
                            <h3 id="execCount">0</h3>
                            <p>执行次数</p>
                        </div>
                    </div>
                    <div class="mcp-stat-card">
                        <div class="mcp-stat-icon purple">
                            <i class="fas fa-clock"></i>
                        </div>
                        <div class="mcp-stat-info">
                            <h3 id="avgTime">0ms</h3>
                            <p>平均响应</p>
                        </div>
                    </div>
                </div>
                
                <div class="mcp-tools-section">
                    <div class="section-header">
                        <h3><i class="fas fa-th"></i> 工具列表</h3>
                        <div class="category-filters">
                            <button class="category-filter active" data-category="all">全部</button>
                            <button class="category-filter" data-category="数学">数学</button>
                            <button class="category-filter" data-category="生活">生活</button>
                            <button class="category-filter" data-category="语言">语言</button>
                            <button class="category-filter" data-category="信息">信息</button>
                            <button class="category-filter" data-category="工具">工具</button>
                            <button class="category-filter" data-category="编程">编程</button>
                            <button class="category-filter" data-category="自定义">自定义</button>
                        </div>
                    </div>
                    
                    <div class="tools-grid" id="toolsGrid"></div>
                </div>
                
                <div class="mcp-execution-section">
                    <div class="section-header">
                        <h3><i class="fas fa-terminal"></i> 执行结果</h3>
                        <button class="icon-btn" id="clearResultsBtn" title="清空结果">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                    
                    <div class="execution-results" id="executionResults">
                        <div class="empty-state small">
                            <i class="fas fa-terminal"></i>
                            <p>选择工具开始执行</p>
                        </div>
                    </div>
                </div>
                
                <div class="mcp-history-section">
                    <div class="section-header">
                        <h3><i class="fas fa-history"></i> 执行历史</h3>
                        <button class="icon-btn" id="refreshHistoryBtn" title="刷新历史">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                    </div>
                    
                    <div class="history-table" id="historyTable">
                        <div class="empty-state small">
                            <i class="fas fa-history"></i>
                            <p>暂无执行历史</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="modal" id="toolModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-tool-header">
                    <div class="modal-tool-icon" id="modalToolIcon">
                        <i class="fas fa-wrench"></i>
                    </div>
                    <div>
                        <h3 id="modalToolName">工具名称</h3>
                        <p id="modalToolDesc">工具描述</p>
                    </div>
                </div>
                <button class="close-btn" id="closeToolModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="tool-params" id="toolParams"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancelToolBtn">取消</button>
                <button class="btn-primary" id="executeToolBtn">
                    <i class="fas fa-play"></i>
                    执行
                </button>
            </div>
        </div>
    </div>
    
    <div class="modal" id="addToolModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-plus"></i> 新增 MCP 工具</h3>
                <button class="close-btn" id="closeAddToolModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="skill-install-form">
                    <div class="form-group">
                        <label>请以 JSON 格式粘贴 MCP 配置 (例如 mcpServers 对象):</label>
                        <textarea id="mcpConfigJson" placeholder='{
  "mcpServers": {
    "chrome-devtools": {
      "command": "npx",
      "args": ["-y", "chrome-devtools-mcp@latest"]
    }
  }
}'></textarea>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancelAddToolBtn">取消</button>
                <button class="btn-primary" id="confirmAddToolBtn">
                    <i class="fas fa-check"></i>
                    确认添加
                </button>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script src="/static/mcp.js"></script>
</body>
</html>
